name: Docker Run
on: [push]

jobs:
    build_jenkins:
      runs-on: self-hosted
      outputs:
        pushed_image: ${{ steps.image.outputs.IMAGE }}
      steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract metadata
        id: meta
        run: |
          echo "REPO_NAME=${GITHUB_REPOSITORY##*/}" >> "$GITHUB_OUTPUT"
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Image Unique
        id: image
        run: |
          IMAGE="${DOCKER_USERNAME}/${DOCKERHUB_PROJECT_NAME}:${SHORT_SHA}"
          echo "IMAGE=$IMAGE" >> $GITHUB_OUTPUT
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKERHUB_PROJECT_NAME: ${{ secrets.DOCKERHUB_PROJECT_NAME }}
          SHORT_SHA: ${{ steps.meta.outputs.SHORT_SHA }}

      # 8. Login to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 9. Build and push prod image
      - name: Build and push production image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKERHUB_PROJECT_NAME }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKERHUB_PROJECT_NAME }}:${{ steps.meta.outputs.SHORT_SHA }}
          cache-from: type=local,src=/tmp/.buildx-

    install_jenkins:
      runs-on: self-hosted
      needs: build_jenkins
      steps:
      - uses: actions/checkout@v4
      - name: Export env variables
        run: |
          echo "IMAGE=${{ needs.build_jenkins.outputs.pushed_image }}" >> .env
      - name: down
        run: docker compose down
      - name: up
        run: docker compose up -d

